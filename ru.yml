old:
  creative:
    compatibility-mode:
      warning: "&c⚠ Предупреждение о режиме совместимости ⚠\n&6Мир запущен в режиме совместимости. В этом режиме вы не можете использовать команды управления миром(/play, /build, /plot), а так же, при работе в режиме совместимости не работают новые функции. Для того, чтобы преобразовать мир в новый формат миров используйте команду /test worldCompatibility -updateWorld, мы не отвечаем за все неполадки в несовместимых с сервером мирах. Вы были предупреждены."
      info: "&6Режим совместимости позволяет игрокам заходить в миры из бета-/альфа- версий сервера, при этом, стабильность работы этих миров не обеспечивается."
      test-hint: "&6Использование: /test -compatibilityMode [args]\n&fДоступные аргументы:\n&e-updateWorld &f- Обновляет мир до актуальной версии данных.\n&e-enable:<ID> &f- Включает режим совместимости для выбранного мира.\n&e-backport &f- Портирует мир из новой версии плагина в Legacy-версию."
      world-update:
        process: "&fОбновление мира..."
        success: "&aМир успешно обновлен до актуальной версии"
        denied: "&cНе удалось обновить мир до актуальной версии"
        data-corrupted: "&cНе удалось найти данные мира старого формата. Возможно, они повреждены или мир уже обновлен."
      world-backport:
        process: "&fПортируем мир..."
        already: "&cМир уже находится в Legacy-формате или режиме совместимости"
        denied: "&cНе удалось портировать мир в Legacy-формат"
        success: "&aМир был успешно портирован!"
